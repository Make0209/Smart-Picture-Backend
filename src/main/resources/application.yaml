spring:
  #  数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/smart_picture
    username: root
    password: 1234
  # 数据库配置 —— 改成 ShardingSphere 驱动, 当使用 ShardingSphere 时, 数据库就交给 ShardingSphere 管理了
  #  datasource:
  #    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
  #    url: jdbc:shardingsphere:classpath:sharding.yaml   # 指向下面的分片配置文件
  # Redis配置
  data:
    redis:
      port: 6379
      password: 1234
      host: localhost
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
#  Servlet配置
server:
  servlet:
    context-path: /api
# Mybatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
    enable-sql-runner: true
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    version: v1.0
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'SmartPicture'
      paths-to-match: '/**'
      packages-to-scan: com.hbpu.smartpicture.controller
